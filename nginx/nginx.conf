# ── Worker tuning ─────────────────────────────────────────────────────────────
worker_processes      auto;           # one per CPU core
worker_rlimit_nofile  65535;

events {
  worker_connections  4096;
  multi_accept        on;
  use                 epoll;
}

http {
  # ── Basic settings ─────────────────────────────────────────────────────────
  include            mime.types;
  default_type       application/octet-stream;
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  server_tokens      off;             # hide nginx version

  # ── Timeouts ───────────────────────────────────────────────────────────────
  keepalive_timeout         65;
  keepalive_requests        1000;
  client_header_timeout     15s;
  client_body_timeout       30s;
  send_timeout              30s;
  proxy_connect_timeout     10s;
  proxy_send_timeout        60s;
  proxy_read_timeout        60s;

  # ── Body size limits ───────────────────────────────────────────────────────
  client_max_body_size      10m;      # allow PDF uploads

  # ── Buffers ────────────────────────────────────────────────────────────────
  proxy_buffer_size         16k;
  proxy_buffers             8 32k;
  proxy_busy_buffers_size   64k;

  # ── Gzip compression ───────────────────────────────────────────────────────
  gzip                on;
  gzip_vary           on;
  gzip_proxied        any;
  gzip_comp_level     5;             # balance CPU vs ratio
  gzip_min_length     1024;
  gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/xml;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr  zone=login_limit:10m  rate=5r/s;
  limit_req_zone  $binary_remote_addr  zone=api_limit:20m    rate=30r/s;
  limit_req_zone  $binary_remote_addr  zone=ai_limit:10m     rate=2r/s;
  limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

  # ── Upstreams with keepalive ───────────────────────────────────────────────
  upstream auth_service {
    server auth-service:5001;
    keepalive 32;                     # persistent connections to backend
  }

  upstream jobs_service {
    server jobs-service:5002;
    keepalive 32;
  }

  upstream admin_service {
    server admin-service:5003;
    keepalive 16;
  }

  upstream client_service {
    server client:5173;
    keepalive 16;
  }

  # ── Logging format ─────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Proxy headers (shared macro) ───────────────────────────────────────────
  proxy_http_version         1.1;
  proxy_set_header           Connection     "";   # keepalive requires empty Connection
  proxy_set_header           Host           $host;
  proxy_set_header           X-Real-IP      $remote_addr;
  proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header           X-Forwarded-Proto $scheme;

  # ── Main server ────────────────────────────────────────────────────────────
  server {
    listen 80;

    # Global connection limit per IP
    limit_conn conn_limit 100;

    # ── Health checks (no rate limiting) ───────────────────────────────────
    location = /health {
      proxy_pass http://auth_service/health;
    }

    # ── Login — strict rate limiting ───────────────────────────────────────
    location = /api/v1/auth/login {
      limit_req zone=login_limit burst=10 nodelay;
      limit_req_status 429;
      proxy_pass http://auth_service;
    }

    # ── Register — moderate rate limiting ──────────────────────────────────
    location = /api/v1/auth/register {
      limit_req zone=login_limit burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://auth_service;
    }

    # ── Auth routes ────────────────────────────────────────────────────────
    location /api/v1/auth {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://auth_service;
    }

    # ── AI endpoints — strict rate limiting ────────────────────────────────
    location ~ ^/api/v1/jobs/[^/]+/(summarize|match-resume|match-resume-pdf)$ {
      limit_req zone=ai_limit burst=3 nodelay;
      limit_req_status 429;
      client_max_body_size 5m;
      proxy_read_timeout 120s;        # AI calls can be slow
      proxy_pass http://jobs_service;
    }

    # ── Jobs routes ────────────────────────────────────────────────────────
    location /api/v1/jobs {
      limit_req zone=api_limit burst=100 nodelay;
      proxy_pass http://jobs_service;
    }

    # ── Admin routes ───────────────────────────────────────────────────────
    location /api/admin {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://admin_service;
    }

    # ── Vite HMR WebSocket (hot reload) ───────────────────────────────────
    location /vite-hmr {
      proxy_pass http://client_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── React frontend (catch-all — must be last) ──────────────────────────
    location / {
      proxy_pass http://client_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";  # needed for Vite HMR
    }

    # ── 429 / 50x error pages ──────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
      internal;
      return 429 '{"message":"Too many requests, please slow down"}';
      add_header Content-Type application/json always;
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
      internal;
      return 503 '{"message":"Service temporarily unavailable"}';
      add_header Content-Type application/json always;
    }
  }
}
